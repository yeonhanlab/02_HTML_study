<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="list-container">
    <div class="list-header">
        <div class="header-title">
            <h2>Device Management</h2>
            <span class="device-count">Total 4 Devices</span>
        </div>
        <button class="btn-add">+ Add Device</button>
    </div>
    <div class="table-wrapper">
        <Table class="device-table">
            <thead>
            <tr>
                <th>device name</th>
                <th>location</th>
                <th>status</th>
                <th>battery</th>
                <th>actions</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>
                    <div class="device-info">
                        <div class="icon-box icon-light"></div>
                        <div class="device name">Smart Bulb A</div>
                    </div>
                </td>
                <td>Living Room</td>
                <td>
                    <div class="status-badge badge-online">
                        <div class="status-dot"></div>
                        <span>Online</span>
                    </div>
                <td>85%</td>
                <td>Edit</td>
            </tr>
            </tbody>
        </Table>
    </div>
</div>
</body>
</html>
