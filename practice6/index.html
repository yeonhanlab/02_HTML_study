<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="list-container">
    <div class="list-header">
        <div class="header-title">
            <h2>Device Management</h2>
            <span class="device-count">Total 4 Devices</span>
        </div>
        <button class="btn-add">+ Add Device</button>
    </div>
    <div class="table-wrapper">
        <Table class="data-table">
            <thead>
            <tr>
                <th>device name</th>
                <th>location</th>
                <th>status</th>
                <th>battery</th>
                <th>actions</th>
            </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="device-info">
                            <div class="icon-box icon-light"></div>
                            <div class="device-name">Smart Bulb A</div>
                        </div>
                    </td>
                    <td>Living Room</td>
                    <td>
                        <div class="status-badge badge-online">
                            <div class="status-dot"></div>
                            <span>Online</span>
                        </div>
                    <td>
                        <div class="battery-wrapper">
                            <div class="battery-bar">
                                <div class="battery-fill" style="width: 85%"></div>
                            </div>
                            <span class="battery-text">85%</span>
                        </div>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit">Edit</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="device-info">
                            <div class="icon-box icon-thermostat"></div>
                            <div class="device-name">Main Thermostat</div>
                        </div>
                    </td>
                    <td>Hallway</td>
                    <td>
                        <div class="status-badge badge-offline">
                            <div class="status-dot"></div>
                            <span>Offline</span>
                        </div>
                    <td>
                        <div class="battery-wrapper">
                            <div class="battery-bar">
                                <div class="battery-fill fill-low" style="width: 15%"></div>
                            </div>
                            <span class="battery-text text-low">15%</span>
                        </div>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit">Edit</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="device-info">
                            <div class="icon-box icon-coffee"></div>
                            <div class="device-name">Coffee Maker Plug</div>
                        </div>
                    </td>
                    <td>Kitchen</td>
                    <td>
                        <div class="status-badge badge-online">
                            <div class="status-dot"></div>
                            <span>Online</span>
                        </div>
                    <td>
                        <div class="plugged-in">Plugged In
                        </div>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit">Edit</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>
                        <div class="device-info">
                            <div class="icon-box icon-camera"></div>
                            <div class="device-name">Front Door Camera</div>
                        </div>
                    </td>
                    <td>Porch</td>
                    <td>
                        <div class="status-badge badge-standby">
                            <div class="status-dot"></div>
                            <span>Standby</span>
                        </div>
                    <td>
                    <div class="battery-wrapper">
                        <div class="battery-bar">
                            <div class="battery-fill" style="width: 60%"></div>
                        </div>
                        <span class="battery-text">60%</span>
                    </div>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit">Edit</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </Table>
    </div>
</div>
</body>
</html>
