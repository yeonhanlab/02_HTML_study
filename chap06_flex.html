<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
      flexbox : 정렬을 할 부모 요소 안에 자식 요소를 배치하는 방식
-->
<div style="display: flex;">

<div style="width: 100px; height: 100px; background: red;"></div>
<div style="width: 100px; height: 100px; background: blue;"></div>
<div style="width: 100px; height: 100px; background: orange;"></div>
</div>



  <!--
        결국, 큰 영역을 그리고 그 안에 요소를 배치하는 방식임
        -->

<div style="width: 100%; display: flex; margin-bottom: 50px">
  <header style="width: 100%; height: 80px; display: flex;">
        <div>로고자리</div>
        <div>메뉴자리</div>
        <div>로그인자리</div>
  </header>
</div>


<!--
      justify-content 속성 : 메인 축에 대한 정렬을 뜻함
                          : 기본은 가로 축이 메인임
             flex-start : 시작점부터 정렬
             flex-end : 끝점부터 정렬
             center : 중앙에 정렬
             space-between : 양 끝에 정렬시킨 뒤 나머지를 여백 크기가 동일하게 정렬
             space-around : 중앙을 중심으로 양 옆 정렬.
      -->


  <div style="width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
      <div style="background-color: #f68989;">로고자리</div>
      <div style="background-color: #6b6bbd;">메뉴자리</div>
      <div style="background-color: #a5a55f;">로그인자리</div>
    </header>
</div>

<!--
        align-items : 보조 축에 대한 정렬
                    : 기본은 세로 축이 보조임
           flex-start : 시작점부터 정렬
           flex-end : 끝점부터 정렬
           center : 중앙에 정렬
-->


<div style="width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;" >
  <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
    <div style="background-color: #e39898; display: flex; align-items: center; font-size: 20px;">로고자리</div>
    <div style="background-color: #a9a9e7; display: flex; align-items: center; font-size: 35px;">메뉴자리</div>
    <div style="background-color: #e0e0a1; display: flex; align-items: center; font-size: 20px;">로그인자리</div>
  </header>
</div>


<div style="width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;" >

    <div style="width: 150px; background-color: #e39898; display: flex; align-items: center; font-size: 20px;">로고자리</div>
    <div style="flex-grow: 1; background-color: #a9a9e7; display: flex; align-items: center; font-size: 35px;">메뉴자리</div>
    <div style="width: 200px; background-color: #e0e0a1; display: flex; align-items: center; font-size: 20px;">로그인자리</div>

</div>

<div style="width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;" >

        <div style="width: 200px; background-color: #e0e0a1; display: flex; align-items: center; font-size: 20px;">로그인자리</div>
    </header>
</div>


<div style = "width: 100%; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>

</body>
</html>
