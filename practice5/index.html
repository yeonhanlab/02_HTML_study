<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container flex-row">
    <section class="info-section flex-col">
        <header class="product-header flex-row">
            <div class="logo">SNKRS.</div>
            <nav class="flex-row top-nav">
                <span>Men</span>
                <span class="active">Women</Span>
                <span>Kids</span>
            </nav>
        </header>
        <div class="product-detail flex-col">
            <span class="badge">Limited Edition</span>
            <h1 class ="title">AIR MAX<br><span class="highlight">PULSE</span></h1>
            <p class="desc">Pushing the limits of what's possible.</p>

        </div>
        <div class="size-selector flex-col">
            <span class="size-label">Select Size (US)</span>
            <div class="sizes flex-row">
                <div class="size-box">7</div>
                <div class="size-box">8</div>
                <div class="size-box size-active">9</div>
                <div class="size-box">10</div>
                <div class="size-box">11</div>
            </div>
        </div>
        <div class="action-row flex-row">
            <span class="price">$ 185.00</span>
            <button class="buy-btn">Add to Bag &rarr;</button>
        </div>
    </section>
    <section class="visual-section flex-col">
        <div class="background-text">MAX</div>

        <div class="img-container flex-center">
            <div class="shoe-img"></div>
        </div>
        <div class="features flex-row">
            <div class="feature-item flex-col">
                <span class="f-val">270도</span>
                <span class="f-key">Air Unit</span>
            </div>
            <div class="feature-item flex-col">
                <span class="f-val">12oz</span>
                <span class="f-key">Lightweight</span>
            </div>
        </div>
    </section>

</div>

</body>
</html>
